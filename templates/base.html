<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Podcast Network{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #667085;
        --line: #d7dde6;
        --panel: #f7f9fc;
        --accent: #0f766e;
        --person: #0f766e;
        --person-bg: #e6f5f2;
        --podcast: #7c2d12;
        --podcast-bg: #fff1e8;
      }
      body {
        margin: 0;
        color: var(--ink);
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }
      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      nav, main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 18px 22px;
      }
      nav {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }
      nav a {
        color: var(--ink);
        text-decoration: none;
      }
      nav a:first-child {
        font-weight: 700;
        margin-right: auto;
      }
      h1 {
        margin: 18px 0 12px;
        font-size: 34px;
        line-height: 1.15;
      }
      h2 {
        margin-top: 30px;
        font-size: 22px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
      }
      input {
        min-width: 260px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }
      button, .button {
        padding: 9px 12px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: #fff;
        background: var(--accent);
        font: inherit;
        text-decoration: none;
      }
      button:hover, .button:hover {
        filter: brightness(0.95);
        cursor: pointer;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin: 22px 0;
      }
      .stat {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .stat strong {
        display: block;
        font-size: 28px;
      }
      .muted {
        color: var(--muted);
      }
      .path-sentence {
        max-width: 860px;
        font-size: 18px;
        line-height: 1.75;
      }
      .path-entity {
        display: inline;
        padding: 2px 6px;
        border-radius: 6px;
        font-weight: 650;
        text-decoration: none;
        white-space: normal;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      a.path-entity:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .path-entity-person {
        color: var(--person);
        background: var(--person-bg);
      }
      .path-entity-podcast {
        color: var(--podcast);
        background: var(--podcast-bg);
      }
      .path-graphic {
        margin: 18px 0 8px;
        overflow-x: auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      .path-graphic-svg {
        display: block;
        min-width: 720px;
        width: 100%;
        height: auto;
      }
      .path-graphic-bg {
        fill: url(#path-grid);
      }
      .path-graphic-grid {
        fill: transparent;
        stroke: rgba(15, 118, 110, 0.12);
        stroke-width: 1;
      }
      #path-grid path {
        fill: none;
        stroke: rgba(100, 116, 139, 0.12);
        stroke-width: 1;
      }
      .path-graphic-edge-halo {
        fill: none;
        stroke: rgba(255, 255, 255, 0.95);
        stroke-linecap: round;
        stroke-width: 9;
      }
      .path-graphic-edge {
        fill: none;
        stroke: url(#edge-gradient);
        stroke-linecap: round;
        stroke-width: 3;
      }
      #path-arrow path {
        fill: #64748b;
      }
      .path-graphic-edge-label {
        fill: #475467;
        font-size: 12px;
        font-weight: 650;
        text-anchor: middle;
        paint-order: stroke;
        stroke: rgba(255, 255, 255, 0.94);
        stroke-width: 6px;
        stroke-linejoin: round;
      }
      .path-graphic-node circle,
      .path-graphic-node rect {
        filter: url(#node-shadow);
        stroke-width: 2.25;
      }
      .path-graphic-node-person circle {
        fill: url(#person-gradient);
        stroke: var(--person);
      }
      .path-graphic-node-podcast rect {
        fill: url(#podcast-gradient);
        stroke: var(--podcast);
      }
      .path-graphic-node text {
        fill: var(--ink);
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
      }
      .path-graphic-node .path-graphic-node-gloss {
        filter: none;
        opacity: 0.55;
        pointer-events: none;
      }
      .path-graphic-node-person .path-graphic-node-gloss {
        fill: rgba(255, 255, 255, 0.7);
        stroke: none;
      }
      .path-graphic-node-podcast .path-graphic-node-gloss {
        fill: none;
        stroke: rgba(255, 255, 255, 0.8);
        stroke-linecap: round;
        stroke-width: 3;
      }
      .path-graphic-node .path-graphic-node-badge {
        fill: #475467;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }
      .suggestion-action {
        display: flex;
        width: fit-content;
        max-width: 100%;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin: 14px 0 4px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .suggestion-action span {
        color: var(--muted);
      }
      .suggestion-action strong {
        color: var(--ink);
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin: 16px 0;
      }
      .pill-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 14px 0;
      }
      .pill {
        display: inline-block;
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        text-decoration: none;
        background: #fff;
      }
      .pill.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 22px;
      }
      .panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .plot {
        margin: 14px 0 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .plot img {
        display: block;
        width: 100%;
        height: auto;
      }
      .interactive-plot iframe {
        display: block;
        width: 100%;
        height: 560px;
        border: 0;
      }
      @media (max-width: 700px) {
        input {
          width: 100%;
          min-width: 0;
        }
        table {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="{% url 'explorer:home' %}">Podcast Network</a>
        <a href="{% url 'explorer:podcasts' %}">Podcasts</a>
        <a href="{% url 'explorer:people' %}">People</a>
        <a href="{% url 'explorer:rankings' %}">Rankings</a>
        <a href="{% url 'explorer:path' %}">Six Degrees</a>
        <a href="{% url 'explorer:common' %}">Common Guests</a>
        <a href="{% url 'explorer:advanced' %}">Advanced</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
