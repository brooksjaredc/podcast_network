<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Six Degrees to Joe Rogan{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #667085;
        --line: #d7dde6;
        --panel: #f7f9fc;
        --accent: #0f766e;
        --person: #0f766e;
        --person-bg: #e6f5f2;
        --podcast: #7c2d12;
        --podcast-bg: #fff1e8;
      }
      body {
        margin: 0;
        color: var(--ink);
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }
      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      nav, main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 18px 22px;
      }
      nav {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }
      nav a {
        color: var(--ink);
        text-decoration: none;
      }
      nav a:first-child {
        font-weight: 700;
        margin-right: auto;
      }
      h1 {
        margin: 18px 0 12px;
        font-size: 34px;
        line-height: 1.15;
      }
      h2 {
        margin-top: 30px;
        font-size: 22px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
      }
      input {
        min-width: 260px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }
      input[type="checkbox"] {
        width: auto;
        min-width: 0;
        padding: 0;
      }
      select {
        min-width: 190px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        font: inherit;
      }
      button, .button {
        padding: 9px 12px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: #fff;
        background: var(--accent);
        font: inherit;
        text-decoration: none;
      }
      button:hover, .button:hover {
        filter: brightness(0.95);
        cursor: pointer;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin: 22px 0;
      }
      .stat {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .stat strong {
        display: block;
        font-size: 28px;
      }
      .muted {
        color: var(--muted);
      }
      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .home-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.04fr) minmax(360px, 0.96fr);
        gap: 34px;
        align-items: center;
        min-height: 560px;
        padding: 32px 0 26px;
      }
      .home-hero h1 {
        max-width: 780px;
        margin: 0;
        font-size: 64px;
        line-height: 0.98;
      }
      .home-lede {
        max-width: 650px;
        margin: 20px 0 0;
        color: #475467;
        font-size: 19px;
      }
      .home-path-form {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin: 28px 0 0;
      }
      .home-path-form input {
        min-width: 210px;
        background: #fff;
      }
      .home-examples {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .home-examples a {
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #344054;
        background: #fff;
        font-size: 14px;
        text-decoration: none;
      }
      .home-examples a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .home-network {
        overflow: hidden;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.86)),
          repeating-linear-gradient(0deg, rgba(100, 116, 139, 0.11) 0 1px, transparent 1px 28px),
          repeating-linear-gradient(90deg, rgba(100, 116, 139, 0.11) 0 1px, transparent 1px 28px);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      }
      .home-network svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .home-network-edge {
        fill: none;
        stroke: #64748b;
        stroke-linecap: round;
        stroke-width: 3;
        opacity: 0.58;
      }
      .home-network-edge.strong {
        stroke: var(--accent);
        stroke-width: 4;
        opacity: 0.75;
      }
      .home-network-edge.faint {
        stroke-dasharray: 6 8;
        opacity: 0.32;
      }
      .home-network-node circle,
      .home-network-node rect {
        filter: url(#home-node-shadow);
        stroke-width: 2.5;
      }
      .home-network-person circle {
        fill: url(#home-person-gradient);
        stroke: var(--person);
      }
      .home-network-podcast rect {
        fill: url(#home-podcast-gradient);
        stroke: var(--podcast);
      }
      .home-network-node.center circle {
        stroke-width: 3.5;
      }
      .home-network-node text {
        fill: var(--ink);
        font-size: 13px;
        font-weight: 800;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .home-network-node.center text {
        font-size: 16px;
      }
      .home-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        overflow: hidden;
        margin: 0 0 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--line);
      }
      .home-stats div {
        padding: 18px 20px;
        background: #fff;
      }
      .home-stats strong {
        display: block;
        font-size: 32px;
        line-height: 1;
      }
      .home-stats span {
        color: var(--muted);
      }
      .home-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin: 18px 0 34px;
      }
      .home-actions a {
        min-height: 136px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: #fff;
        text-decoration: none;
        transition: border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }
      .home-actions a:hover {
        border-color: rgba(15, 118, 110, 0.45);
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
        transform: translateY(-1px);
      }
      .home-actions strong {
        display: block;
        margin-bottom: 10px;
        font-size: 17px;
      }
      .home-actions span {
        color: var(--muted);
        font-size: 14px;
      }
      .path-sentence {
        max-width: 860px;
        font-size: 18px;
        line-height: 1.75;
      }
      .path-entity {
        display: inline;
        padding: 2px 6px;
        border-radius: 6px;
        font-weight: 650;
        text-decoration: none;
        white-space: normal;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      a.path-entity:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .path-entity-person {
        color: var(--person);
        background: var(--person-bg);
      }
      .path-entity-podcast {
        color: var(--podcast);
        background: var(--podcast-bg);
      }
      .path-graphic {
        margin: 18px 0 8px;
        overflow-x: auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      .path-graphic-svg {
        display: block;
        min-width: 720px;
        width: 100%;
        height: auto;
      }
      .path-graphic-bg {
        fill: url(#path-grid);
      }
      .path-graphic-grid {
        fill: transparent;
        stroke: rgba(15, 118, 110, 0.12);
        stroke-width: 1;
      }
      #path-grid path {
        fill: none;
        stroke: rgba(100, 116, 139, 0.12);
        stroke-width: 1;
      }
      .path-graphic-edge-halo {
        fill: none;
        stroke: rgba(255, 255, 255, 0.95);
        stroke-linecap: round;
        stroke-width: 9;
      }
      .path-graphic-edge {
        fill: none;
        stroke: url(#edge-gradient);
        stroke-linecap: round;
        stroke-width: 3;
      }
      #path-arrow path {
        fill: #64748b;
      }
      .path-graphic-edge-label {
        fill: #475467;
        font-size: 12px;
        font-weight: 650;
        text-anchor: middle;
        paint-order: stroke;
        stroke: rgba(255, 255, 255, 0.94);
        stroke-width: 6px;
        stroke-linejoin: round;
      }
      .path-graphic-node circle,
      .path-graphic-node rect {
        filter: url(#node-shadow);
        stroke-width: 2.25;
      }
      .path-graphic-node-person circle {
        fill: url(#person-gradient);
        stroke: var(--person);
      }
      .path-graphic-node-podcast rect {
        fill: url(#podcast-gradient);
        stroke: var(--podcast);
      }
      .path-graphic-node text {
        fill: var(--ink);
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
      }
      .path-graphic-node .path-graphic-node-gloss {
        filter: none;
        opacity: 0.55;
        pointer-events: none;
      }
      .path-graphic-node-person .path-graphic-node-gloss {
        fill: rgba(255, 255, 255, 0.7);
        stroke: none;
      }
      .path-graphic-node-podcast .path-graphic-node-gloss {
        fill: none;
        stroke: rgba(255, 255, 255, 0.8);
        stroke-linecap: round;
        stroke-width: 3;
      }
      .path-graphic-node .path-graphic-node-badge {
        fill: #475467;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }
      .suggestion-action {
        display: flex;
        width: fit-content;
        max-width: 100%;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin: 14px 0 4px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .suggestion-action span {
        color: var(--muted);
      }
      .suggestion-action strong {
        color: var(--ink);
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin: 16px 0;
      }
      .pill-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 14px 0;
      }
      .pill {
        display: inline-block;
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        text-decoration: none;
        background: #fff;
      }
      .pill.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .pill-form {
        display: inline;
        margin: 0;
      }
      .pill-button {
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        background: #fff;
        font-size: 14px;
      }
      .pill-button.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--person-bg);
      }
      .filter-section {
        margin: 16px 0;
      }
      .filter-section h3 {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 22px;
      }
      .recommendations-layout {
        display: grid;
        grid-template-columns: minmax(260px, 0.78fr) minmax(0, 1.25fr) minmax(220px, 0.62fr);
        gap: 22px;
        align-items: start;
      }
      .stack {
        display: grid;
        gap: 12px;
      }
      .podcast-row {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }
      .podcast-row-header {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        justify-content: space-between;
      }
      .podcast-row h3 {
        margin: 0 0 6px;
        font-size: 17px;
        line-height: 1.25;
      }
      .podcast-row p {
        margin: 6px 0 0;
      }
      .secondary-button {
        border-color: var(--line);
        color: var(--ink);
        background: #fff;
      }
      .inline-check {
        display: inline-flex;
        gap: 7px;
        align-items: center;
        color: var(--ink);
      }
      .panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .plot {
        margin: 14px 0 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .plot img {
        display: block;
        width: 100%;
        height: auto;
      }
      .interactive-plot iframe {
        display: block;
        width: 100%;
        height: 560px;
        border: 0;
      }
      @media (max-width: 700px) {
        input {
          width: 100%;
          min-width: 0;
        }
        table {
          font-size: 14px;
        }
        .home-hero {
          grid-template-columns: 1fr;
          min-height: 0;
        }
        .home-hero h1 {
          font-size: 46px;
        }
        .home-network {
          max-width: 620px;
        }
        .home-stats,
        .home-actions {
          grid-template-columns: 1fr;
        }
        .recommendations-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="{% url 'explorer:home' %}">Six Degrees to Joe Rogan</a>
        <a href="{% url 'explorer:podcasts' %}">Podcasts</a>
        <a href="{% url 'explorer:people' %}">People</a>
        <a href="{% url 'explorer:rankings' %}">Rankings</a>
        <a href="{% url 'explorer:recommendations' %}">Recommendations</a>
        <a href="{% url 'explorer:path' %}">Six Degrees</a>
        <a href="{% url 'explorer:common' %}">Common Guests</a>
        <a href="{% url 'explorer:advanced' %}">Advanced</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
